<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro Difficulty Ranking</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000; /* Negro total[cite: 1] */
            color: #ffffff;
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2 {
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .upload-section {
            border: 1px solid #333;
            padding: 20px;
            text-align: center;
            background-color: #0a0a0a; /* Gris casi negro[cite: 1] */
            margin-bottom: 20px;
            border-radius: 8px;
        }
        .upload-section input[type="file"] {
            display: none;
        }
        .custom-file-upload, .btn-save-load {
            display: inline-block;
            padding: 10px 20px;
            background-color: #1a1a1a;
            color: #007acc;
            border: 1px solid #007acc;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }
        .custom-file-upload:hover, .btn-save-load:hover {
            background-color: #007acc;
            color: white;
        }
        .form-group {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .form-group input[type="text"] {
            padding: 10px;
            background-color: #121212;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
            flex: 1;
            min-width: 200px;
        }
        .form-group button {
            padding: 10px 20px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }
        .form-group button:hover {
            background-color: #cccccc;
        }
        /* Storage controls area */
        .storage-control-panel {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
            background-color: #0a0a0a;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #222;
        }
        .btn-export {
            border-color: #4CAF50;
            color: #4CAF50;
        }
        .btn-export:hover {
            background-color: #4CAF50;
            color: white;
        }
        .btn-import {
            border-color: #ffca28;
            color: #ffca28;
        }
        .btn-import:hover {
            background-color: #ffca28;
            color: black;
        }
        /* Custom Ordered List Structure */
        ol {
            list-style-type: none;
            padding: 0;
            counter-reset: rank-counter;
        }
        li {
            counter-increment: rank-counter;
            background-color: #0a0a0a; /* Fondo de cada item[cite: 1] */
            margin: 10px 0;
            padding: 15px;
            border: 1px solid #222;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        li::before {
            content: "#" counter(rank-counter) " ";
            font-weight: bold;
            font-size: 1.3em;
            color: #ffca28;
            margin-right: 15px;
            min-width: 40px;
        }
        .level-info {
            flex: 1;
        }
        .file-name {
            font-size: 0.85em;
            color: #666;
            margin-left: 10px;
        }
        .level-link {
            font-size: 0.85em;
            color: #007acc;
            text-decoration: none;
            margin-left: 10px;
            border: 1px solid #007acc;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .actions button {
            padding: 6px 10px;
            margin-left: 5px;
            background-color: #111;
            color: #eee;
            border: 1px solid #444;
            cursor: pointer;
            border-radius: 4px;
        }
        .actions .btn-delete {
            color: #ff4444;
            border-color: #ff4444;
        }
        .actions .btn-delete:hover {
            background-color: #ff4444;
            color: white;
        }
    </style>
</head>
<body>

    <h1>Macro Difficulty Ranking</h1>
    <p style="color: #888;"></p>

    <hr style="border: 0; border-top: 1px solid #222; margin: 20px 0;">

    <!-- Save & Load External File Section -->
    <div class="storage-control-panel">
        <button class="btn-save-load btn-export" onclick="exportRankingJSON()">Export List (.json)</button>
        <label class="btn-save-load btn-import">
            <input type="file" id="importJsonFile" accept=".json" style="display:none;" onchange="importRankingJSON(this)">
            Import List (.json)
        </label>
    </div>

    <div class="upload-section">
        <label class="custom-file-upload">
            <input type="file" id="macroFile">
            Choose Macro File
        </label>
        <span id="fileCheck" style="margin-left: 10px; color: #555;">No file chosen</span>

        <div class="form-group">
            <input type="text" id="levelName" placeholder="Level Name">
            <input type="text" id="levelUrl" placeholder="Link/URL">
            <button onclick="addLevel()">Add to List</button>
        </div>
    </div>

    <h2>Current Top</h2>
    <ol id="rankingList"></ol>

    <script>
        let selectedFileName = "";
        const fileInput = document.getElementById('macroFile');
        const fileCheck = document.getElementById('fileCheck');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                selectedFileName = this.files[0].name;
                fileCheck.textContent = "Selected: " + selectedFileName;
                fileCheck.style.color = "#4CAF50";
            }
        });

        // Main function to read current ranking items from DOM to JSON
        function getRankingData() {
            const listItems = document.querySelectorAll('#rankingList li');
            const data = [];
            listItems.forEach(li => {
                data.push({
                    n: li.getAttribute('data-name'),
                    f: li.getAttribute('data-file'),
                    u: li.getAttribute('data-url')
                });
            });
            return data;
        }

        // Save data to LocalStorage automatically
        function saveToLocalStorage() {
            const data = getRankingData();
            localStorage.setItem('macroRankingData', JSON.stringify(data));
        }

        function addLevel(name = "", fileName = "", url = "", isBulkLoading = false) {
            const levelNameInput = document.getElementById('levelName');
            const levelUrlInput = document.getElementById('levelUrl');
            
            const finalName = name || levelNameInput.value.trim();
            const finalFileName = fileName || selectedFileName;
            const finalUrl = url || levelUrlInput.value.trim();

            if (finalName === "") {
                if(!name) alert("Enter a name!");
                return;
            }

            const list = document.getElementById('rankingList');
            const li = document.createElement('li');

            let linkHtml = "";
            if (finalUrl) {
                const formattedUrl = finalUrl.match(/^https?:\/\//i) ? finalUrl : 'https://' + finalUrl;
                linkHtml = `<a href="${formattedUrl}" target="_blank" class="level-link">Link</a>`;
            }

            const infoDiv = document.createElement('div');
            infoDiv.className = "level-info";
            infoDiv.innerHTML = `<strong>${finalName}</strong> <span class="file-name">${finalFileName || ""}</span> ${linkHtml}`;
            
            li.setAttribute('data-name', finalName);
            li.setAttribute('data-file', finalFileName);
            li.setAttribute('data-url', finalUrl);
            
            li.appendChild(infoDiv);

            const actionsDiv = document.createElement('div');
            actionsDiv.className = "actions";
            actionsDiv.innerHTML = `
                <button onclick="moveUp(this)">▲</button>
                <button onclick="moveDown(this)">▼</button>
                <button onclick="btnDelete(this)" class="btn-delete">✖</button>
            `;
            li.appendChild(actionsDiv);
            list.appendChild(li);

            if (!name) {
                levelNameInput.value = "";
                levelUrlInput.value = "";
                fileInput.value = "";
                selectedFileName = "";
                fileCheck.textContent = "No file chosen";
                fileCheck.style.color = "#555";
            }

            // Trigger auto-save unless we are massively inserting items via load/import
            if (!isBulkLoading) {
                saveToLocalStorage();
            }
        }

        function moveUp(button) {
            const li = button.parentElement.parentElement;
            const previous = li.previousElementSibling;
            if (previous) {
                li.parentNode.insertBefore(li, previous);
                saveToLocalStorage();
            }
        }

        function moveDown(button) {
            const li = button.parentElement.parentElement;
            const next = li.nextElementSibling;
            if (next) {
                li.parentNode.insertBefore(next, li);
                saveToLocalStorage();
            }
        }

        function btnDelete(button) {
            button.parentElement.parentElement.remove();
            saveToLocalStorage();
        }

        // --- NEW SAVE / LOAD SYSTEM FUNCTIONS ---

        // Exports the list as a .json file download
        function exportRankingJSON() {
            const data = getRankingData();
            if (data.length === 0) {
                alert("The list is empty. There is nothing to export!");
                return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "macro_ranking.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        // Imports the list from an external .json file
        function importRankingJSON(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (Array.isArray(importedData)) {
                            if(confirm("This will overwrite your current list. Do you want to proceed?")) {
                                document.getElementById('rankingList').innerHTML = ""; // Clear existing
                                importedData.forEach(item => addLevel(item.n, item.f, item.u, true));
                                saveToLocalStorage();
                                alert("Ranking successfully imported!");
                            }
                        } else {
                            alert("Invalid file format.");
                        }
                    } catch (error) {
                        alert("Error reading the file.");
                        console.error(error);
                    }
                };
                reader.readAsText(input.files[0]);
                input.value = ""; // Reset file input
            }
        }

        // Combined initialization on load (URL Params + LocalStorage)
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const rankData = urlParams.get('rank');
            
            if (rankData) {
                // Load from URL if present
                try {
                    const decodedJson = decodeURIComponent(escape(atob(rankData)));
                    JSON.parse(decodedJson).forEach(item => addLevel(item.n, item.f, item.u, true));
                    saveToLocalStorage();
                } catch (e) { console.error("Error loading URL data", e); }
            } else {
                // Otherwise load from LocalStorage
                const savedData = localStorage.getItem('macroRankingData');
                if (savedData) {
                    try {
                        JSON.parse(savedData).forEach(item => addLevel(item.n, item.f, item.u, true));
                    } catch (e) { console.error("Error loading LocalStorage data", e); }
                }
            }
        });
    </script>
</body>
</html>
