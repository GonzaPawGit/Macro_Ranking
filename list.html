<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro Difficulty Ranking</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000; /* Negro total[cite: 1] */
            color: #ffffff;
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2 {
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .upload-section {
            border: 1px solid #333;
            padding: 20px;
            text-align: center;
            background-color: #0a0a0a; /* Gris casi negro[cite: 1] */
            margin-bottom: 20px;
            border-radius: 8px;
        }
        .upload-section input[type="file"] {
            display: none;
        }
        .custom-file-upload {
            display: inline-block;
            padding: 10px 20px;
            background-color: #1a1a1a;
            color: #007acc;
            border: 1px solid #007acc;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }
        .custom-file-upload:hover {
            background-color: #007acc;
            color: white;
        }
        .form-group {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .form-group input[type="text"] {
            padding: 10px;
            background-color: #121212;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
            flex: 1;
            min-width: 200px;
        }
        .form-group button {
            padding: 10px 20px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }
        .form-group button:hover {
            background-color: #cccccc;
        }
        .share-box {
            margin: 20px 0;
            padding: 15px;
            background-color: #0a0a0a;
            border: 1px solid #1a237e;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .share-box input {
            flex: 1;
            padding: 8px;
            background: #000000;
            border: 1px solid #333;
            color: #4CAF50;
            border-radius: 4px;
        }
        .share-box button {
            padding: 8px 16px;
            background-color: #1a237e;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        /* Custom Ordered List Structure */
        ol {
            list-style-type: none;
            padding: 0;
            counter-reset: rank-counter;
        }
        li {
            counter-increment: rank-counter;
            background-color: #0a0a0a; /* Fondo de cada item[cite: 1] */
            margin: 10px 0;
            padding: 15px;
            border: 1px solid #222;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        li::before {
            content: "#" counter(rank-counter) " ";
            font-weight: bold;
            font-size: 1.3em;
            color: #ffca28;
            margin-right: 15px;
            min-width: 40px;
        }
        .level-info {
            flex: 1;
        }
        .file-name {
            font-size: 0.85em;
            color: #666;
            margin-left: 10px;
        }
        .level-link {
            font-size: 0.85em;
            color: #007acc;
            text-decoration: none;
            margin-left: 10px;
            border: 1px solid #007acc;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .actions button {
            padding: 6px 10px;
            margin-left: 5px;
            background-color: #111;
            color: #eee;
            border: 1px solid #444;
            cursor: pointer;
            border-radius: 4px;
        }
        .actions .btn-delete {
            color: #ff4444;
            border-color: #ff4444;
        }
        .actions .btn-delete:hover {
            background-color: #ff4444;
            color: white;
        }
    </style>
</head>
<body>

    <h1>Macro Difficulty Ranking</h1>
    <p style="color: #888;">Upload files, add links, and generate your shareable ranking.</p>

    <hr style="border: 0; border-top: 1px solid #222; margin: 20px 0;">

    <div class="upload-section">
        <label class="custom-file-upload">
            <input type="file" id="macroFile">
            Choose Macro File
        </label>
        <span id="fileCheck" style="margin-left: 10px; color: #555;">No file chosen</span>

        <div class="form-group">
            <input type="text" id="levelName" placeholder="Level Name">
            <input type="text" id="levelUrl" placeholder="Link/URL">
            <button onclick="addLevel()">Add to List</button>
        </div>
    </div>

    <div class="share-box">
        <input type="text" id="shareUrlInput" readonly placeholder="Link will appear here...">
        <button onclick="generateShareLink()">Copy Share Link</button>
    </div>

    <h2>Current Top</h2>
    <ol id="rankingList"></ol>

    <script>
        let selectedFileName = "";
        const fileInput = document.getElementById('macroFile');
        const fileCheck = document.getElementById('fileCheck');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                selectedFileName = this.files[0].name;
                fileCheck.textContent = "Selected: " + selectedFileName;
                fileCheck.style.color = "#4CAF50";
            }
        });

        function addLevel(name = "", fileName = "", url = "") {
            const levelNameInput = document.getElementById('levelName');
            const levelUrlInput = document.getElementById('levelUrl');
            
            const finalName = name || levelNameInput.value.trim();
            const finalFileName = fileName || selectedFileName;
            const finalUrl = url || levelUrlInput.value.trim();

            if (finalName === "") {
                if(!name) alert("Enter a name!");
                return;
            }

            const list = document.getElementById('rankingList');
            const li = document.createElement('li');

            let linkHtml = "";
            if (finalUrl) {
                const formattedUrl = finalUrl.match(/^https?:\/\//i) ? finalUrl : 'https://' + finalUrl;
                linkHtml = `<a href="${formattedUrl}" target="_blank" class="level-link">Link</a>`;
            }

            const infoDiv = document.createElement('div');
            infoDiv.className = "level-info";
            infoDiv.innerHTML = `<strong>${finalName}</strong> <span class="file-name">${finalFileName || ""}</span> ${linkHtml}`;
            
            li.setAttribute('data-name', finalName);
            li.setAttribute('data-file', finalFileName);
            li.setAttribute('data-url', finalUrl);
            
            li.appendChild(infoDiv);

            const actionsDiv = document.createElement('div');
            actionsDiv.className = "actions";
            actionsDiv.innerHTML = `
                <button onclick="moveUp(this)">▲</button>
                <button onclick="moveDown(this)">▼</button>
                <button onclick="btnDelete(this)" class="btn-delete">✖</button>
            `;
            li.appendChild(actionsDiv);
            list.appendChild(li);

            if (!name) {
                levelNameInput.value = "";
                levelUrlInput.value = "";
                fileInput.value = "";
                selectedFileName = "";
                fileCheck.textContent = "No file chosen";
                fileCheck.style.color = "#555";
            }
        }

        function moveUp(button) {
            const li = button.parentElement.parentElement;
            const previous = li.previousElementSibling;
            if (previous) li.parentNode.insertBefore(li, previous);
        }

        function moveDown(button) {
            const li = button.parentElement.parentElement;
            const next = li.nextElementSibling;
            if (next) li.parentNode.insertBefore(next, li);
        }

        function btnDelete(button) {
            button.parentElement.parentElement.remove();
        }

        function generateShareLink() {
            const listItems = document.querySelectorAll('#rankingList li');
            const data = [];
            listItems.forEach(li => {
                data.push({ n: li.getAttribute('data-name'), f: li.getAttribute('data-file'), u: li.getAttribute('data-url') });
            });
            const jsonStr = JSON.stringify(data);
            const encodedData = btoa(unescape(encodeURIComponent(jsonStr)));
            const shareUrl = window.location.origin + window.location.pathname + "?rank=" + encodedData;
            const shareInput = document.getElementById('shareUrlInput');
            shareInput.value = shareUrl;
            shareInput.select();
            document.execCommand('copy');
            alert("Copied!");
        }

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const rankData = urlParams.get('rank');
            if (rankData) {
                try {
                    const decodedJson = decodeURIComponent(escape(atob(rankData)));
                    JSON.parse(decodedJson).forEach(item => addLevel(item.n, item.f, item.u));
                } catch (e) { console.error("Error loading data", e); }
            }
        });
    </script>
</body>
</html>
